<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>14 Day Fitness Tracker</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  color: white;

  /* 🏋️ Better gym background (side composition) */
  background: url('https://images.unsplash.com/photo-1583454110551-21f2fa2afe61') no-repeat center center fixed;
  background-size: cover;
}

/* Overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

h1 {
  text-align: center;
  margin: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

select {
  display: block;
  margin: 0 auto 20px;
  padding: 10px;
  border-radius: 6px;
}

/* FLEX CARD */
.card {
  background: rgba(30, 41, 59, 0.85);
  margin: 10px 0;
  padding: 15px;
  border-radius: 10px;

  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 15px;
}

.task {
  text-align: left;
  flex: 1;
}

button {
  padding: 8px 15px;
  border: none;
  border-radius: 5px;
  background: #facc15;
  color: black;
  cursor: pointer;
  font-weight: bold;
  white-space: nowrap;
}

.done {
  background: #065f46 !important;
}

.done button {
  background: #22c55e !important;
  color: white;
}

.progress {
  text-align: center;
  margin-top: 20px;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>🔥 14-Day Fitness Tracker</h1>

<select id="daySelect" onchange="changeDay()"></select>

<div class="container" id="schedule"></div>

<div class="progress">
Completed: <span id="count">0</span> / 14
</div>

<script>
function getIcon(task) {
  if (task.includes("Treadmill")) return "🏃";
  if (task.includes("Abs")) return "🔥";
  if (task.includes("Push-ups")) return "💪";
  if (task.includes("Plank")) return "🧘";
  return "🏋️";
}

const plan = [
"5:00 AM - Treadmill:- [• incline walk (3–3.5 km/h, incline 12–14)]",
"5:30 AM - Abs Workout:- [• Plank – 3 × 45–60 sec • Leg raises – 3 × 12 • Crunches – 3 × 15 • Mountain climbers – 2 × 30]",
"6:30 AM - Push-ups + Pull-ups:- [• 10–12 push-ups • 5 pull-ups]",
"7:30 AM - Plank + Crunches:- [• Plank 3 x (20 sec) • Crunches 3x (10 reps)]",
"8:30 AM - Push-ups + Pull-ups:- [• 10–12 push-ups • 5 pull-ups]",
"11:30 AM - Plank + Crunches:- [• Plank 3 x (20 sec) • Crunches 3x (10 reps)]",
"12:30 PM - Push-ups + Pull-ups:- [• 10–12 push-ups • 5 pull-ups]",
"1:30 PM - Plank + Crunches:- [• Plank 3 x (20 sec) • Crunches 3x (10 reps)]",
"2:30 PM - Push-ups + Pull-ups:- [• 10–12 push-ups • 5 pull-ups]",
"3:30 PM - Plank + Crunches:- [• Plank 3 x (20 sec) • Crunches 3x (10 reps)]",
"4:30 PM - Push-ups + Pull-ups:- [• 10–12 push-ups • 5 pull-ups]",
"5:30 PM - Plank + Crunches:- [• Plank 3 x (20 sec) • Crunches 3x (10 reps)]",
"6:30 PM - Push-ups + Pull-ups:- [• 10–12 push-ups • 5 pull-ups]",
"7:30 PM - Plank + Crunches ✅ (Final Burn):- [• Plank 3 x (20 sec) • Crunches 3x (10 reps)]"
];

let currentDay = localStorage.getItem("currentDay") || "Day 1";

const daySelect = document.getElementById("daySelect");

for (let i = 1; i <= 14; i++) {
  let option = document.createElement("option");
  option.value = "Day " + i;
  option.text = "Day " + i;
  daySelect.appendChild(option);
}

daySelect.value = currentDay;

function getProgressKey() {
  return "fitness_" + currentDay;
}

function getProgress() {
  return JSON.parse(localStorage.getItem(getProgressKey())) || {};
}

function saveProgress(data) {
  localStorage.setItem(getProgressKey(), JSON.stringify(data));
}

function render() {
  const container = document.getElementById("schedule");
  container.innerHTML = "";

  let progress = getProgress();
  let count = 0;

  plan.forEach((task, index) => {
    let done = progress[index];
    if (done) count++;

    container.innerHTML += `
      <div class="card ${done ? 'done' : ''}">
        
        <div class="task">
          ${getIcon(task)} ${task}
        </div>

        <button onclick="toggle(${index})">
          ${done ? "Completed" : "Mark Done"}
        </button>

      </div>
    `;
  });

  document.getElementById("count").innerText = count;
}

/* 🔁 TOGGLE FUNCTION (MAIN FIX) */
function toggle(index) {
  let progress = getProgress();

  // toggle true/false
  progress[index] = !progress[index];

  saveProgress(progress);
  render();
}

function changeDay() {
  currentDay = daySelect.value;
  localStorage.setItem("currentDay", currentDay);
  render();
}

render();
</script>
  
</body>
</html>
