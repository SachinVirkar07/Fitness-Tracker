<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Fitness Hourly Tracker</title>

<style>
body {
  font-family: Arial;
  background: #020617;
  color: white;
  margin: 0;
  text-align: center;
}

h1 {
  margin: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  margin: 10px 0;
  padding: 15px;
  border-radius: 10px;
}

.time {
  font-weight: bold;
  font-size: 18px;
}

button {
  margin-top: 10px;
  padding: 8px 15px;
  border: none;
  border-radius: 5px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}

.done {
  background: #065f46 !important;
}

.progress {
  font-size: 18px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>🔥 Daily Fitness Hourly Tracker</h1>

<div class="container" id="schedule"></div>

<div class="progress">
Completed: <span id="count">0</span> / 12
</div>

<button onclick="resetDay()">Reset Day</button>

<script>
const plan = [
{time:"5:00 AM", task:"Treadmill (Fat Loss)"},
{time:"5:30 AM", task:"Abs Workout"},
{time:"6:30 AM", task:"Push-ups + Pull-ups"},
{time:"7:30 AM", task:"Plank + Crunches"},
{time:"8:30 AM", task:"Push-ups + Pull-ups"},
{time:"11:30 AM", task:"Plank + Crunches"},
{time:"12:30 PM", task:"Push-ups + Pull-ups"},
{time:"1:30 PM", task:"Plank + Crunches"},
{time:"2:30 PM", task:"Push-ups + Pull-ups"},
{time:"3:30 PM", task:"Plank + Crunches"},
{time:"4:30 PM", task:"Push-ups + Pull-ups"},
{time:"5:30 PM", task:"Plank + Crunches"},
{time:"6:30 PM", task:"Push-ups + Pull-ups"}
];

let progress = JSON.parse(localStorage.getItem("hourlyFitness")) || {};

function render() {
  const container = document.getElementById("schedule");
  container.innerHTML = "";
  let count = 0;

  plan.forEach((item, index) => {
    const done = progress[index];

    if (done) count++;

    container.innerHTML += `
      <div class="card ${done ? 'done' : ''}">
        <div class="time">${item.time}</div>
        <div>${item.task}</div>
        <button onclick="mark(${index})">
          ${done ? "Completed" : "Mark Done"}
        </button>
      </div>
    `;
  });

  document.getElementById("count").innerText = count;
}

function mark(index) {
  progress[index] = true;
  localStorage.setItem("hourlyFitness", JSON.stringify(progress));
  render();
}

function resetDay() {
  progress = {};
  localStorage.setItem("hourlyFitness", JSON.stringify(progress));
  render();
}

render();
</script>

</body>
</html>
