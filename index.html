<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>14 Day Fitness Tracker</title>

<style>
body {
  font-family: Arial;
  background: #020617;
  color: white;
  text-align: center;
}

h1 {
  margin: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

select {
  padding: 10px;
  margin-bottom: 20px;
  border-radius: 6px;
}

.card {
  background: #1e293b;
  margin: 10px 0;
  padding: 15px;
  border-radius: 10px;
}

.time {
  font-weight: bold;
}

button {
  margin-top: 10px;
  padding: 8px 15px;
  border: none;
  border-radius: 5px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}

.done {
  background: #065f46 !important;
}

.progress {
  margin-top: 20px;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>🔥 14-Day Fitness Tracker</h1>

<select id="daySelect" onchange="changeDay()"></select>

<div class="container" id="schedule"></div>

<div class="progress">
Completed: <span id="count">0</span> / 14
</div>

<script>
const plan = [
"5:00 AM - Treadmill",
"5:30 AM - Abs Workout",
"6:30 AM - Push-ups + Pull-ups",
"7:30 AM - Plank + Crunches",
"8:30 AM - Push-ups + Pull-ups",
"11:30 AM - Plank + Crunches",
"12:30 PM - Push-ups + Pull-ups",
"1:30 PM - Plank + Crunches",
"2:30 PM - Push-ups + Pull-ups",
"3:30 PM - Plank + Crunches",
"4:30 PM - Push-ups + Pull-ups",
"5:30 PM - Plank + Crunches",
"6:30 PM - Push-ups + Pull-ups",
"7:30 PM - Plank + Crunches ✅ (Final Burn)"  
];

let currentDay = localStorage.getItem("currentDay") || "Day 1";

const daySelect = document.getElementById("daySelect");

// Populate dropdown
for (let i = 1; i <= 14; i++) {
  let option = document.createElement("option");
  option.value = "Day " + i;
  option.text = "Day " + i;
  daySelect.appendChild(option);
}

daySelect.value = currentDay;

function getProgressKey() {
  return "fitness_" + currentDay;
}

function getProgress() {
  return JSON.parse(localStorage.getItem(getProgressKey())) || {};
}

function saveProgress(data) {
  localStorage.setItem(getProgressKey(), JSON.stringify(data));
}

function render() {
  const container = document.getElementById("schedule");
  container.innerHTML = "";

  let progress = getProgress();
  let count = 0;

  plan.forEach((task, index) => {
    let done = progress[index];

    if (done) count++;

    container.innerHTML += `
      <div class="card ${done ? 'done' : ''}">
        <div class="time">${task}</div>
        <button onclick="mark(${index})">
          ${done ? "Completed" : "Mark Done"}
        </button>
      </div>
    `;
  });

  document.getElementById("count").innerText = count;
}

function mark(index) {
  let progress = getProgress();
  progress[index] = true;
  saveProgress(progress);
  render();
}

function changeDay() {
  currentDay = daySelect.value;
  localStorage.setItem("currentDay", currentDay);
  render();
}

render();
</script>

</body>
</html>
